name: Build & Push Docker Images

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: backend
            dockerfile: Dockerfile.backend
          - target: frontend
            dockerfile: Dockerfile.frontend
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.target }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  smoke-test:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start stack
        run: |
          # Override images to use freshly pushed ones
          export TAG="${GITHUB_REF_NAME#v}"
          cat > docker-compose.ci.yml <<EOF
          services:
            backend:
              image: ${REGISTRY}/${IMAGE_PREFIX}-backend:${TAG}
              build: !reset null
            frontend:
              image: ${REGISTRY}/${IMAGE_PREFIX}-frontend:${TAG}
              build: !reset null
          EOF
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d
          sleep 10

      - name: Health check
        run: |
          STATUS=$(curl -sf http://localhost:4000/api/health | jq -r '.status')
          echo "Health status: $STATUS"
          [ "$STATUS" = "ok" ] || exit 1

      - name: Frontend responds
        run: |
          HTTP_CODE=$(curl -so /dev/null -w '%{http_code}' http://localhost:3000)
          echo "Frontend HTTP: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || exit 1

      - name: API proxy works
        run: |
          curl -sf http://localhost:3000/api/health | jq .

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
